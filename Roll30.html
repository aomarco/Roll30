<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111216">
    <title>Roll30 · Private Table</title>
    <link rel="stylesheet" href="./roll30-live.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8"></script>
    <script src="./roll30-backend.js"></script>
    <script type="module" src="./roll30-live.js"></script>
  </head>
  <body>
    <section id="access-gate" class="gate" aria-live="polite">
      <div class="gate-card">
        <div class="brand-mark" aria-hidden="true">R</div>
        <p class="eyebrow">Private campaign table</p>
        <h1>Roll30</h1>
        <p id="gate-copy" class="gate-copy">Checking whether this table already knows you…</p>
        <form id="gate-form" class="gate-hidden">
          <label for="gate-password">Table password</label>
          <input id="gate-password" type="password" autocomplete="current-password" required autofocus>
          <button id="gate-submit" class="button primary" type="submit">Enter the table</button>
        </form>
        <p id="gate-status" class="gate-status" role="status"></p>
      </div>
    </section>

    <div id="live-roll30" class="app-root" aria-live="polite">
      <main class="startup-state">
        <div class="brand-mark" aria-hidden="true">R</div>
        <h1>Opening your table</h1>
        <p>Loading the campaign and checking your role…</p>
        <span class="spinner" aria-hidden="true"></span>
      </main>
    </div>

    <noscript>Roll30 needs JavaScript enabled to connect to your private table.</noscript>
  </body>
</html>
