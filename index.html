<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d0d0f">
    <title>Roll30 · Private Table</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8"></script>
    <script src="./roll30-backend.js"></script>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; overflow: hidden; background: #0d0d0f; color: #ececee; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at 20% 15%, rgba(230,169,77,.14), transparent 30rem), radial-gradient(circle at 80% 88%, rgba(125,107,208,.13), transparent 25rem); }
      main { position: relative; width: min(100% - 32px, 430px); padding: 42px 38px 36px; border: 1px solid #323039; border-radius: 20px; background: linear-gradient(145deg, rgba(34,33,39,.96), rgba(20,20,24,.96)); box-shadow: 0 25px 80px rgba(0,0,0,.48); }
      .eyebrow { margin: 0 0 13px; color: #e6a94d; font-size: 11px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(34px, 9vw, 46px); font-weight: 750; letter-spacing: -.04em; }
      .intro { margin: 13px 0 28px; color: #a7a5ae; line-height: 1.6; }
      form { display: grid; gap: 12px; }
      label { color: #d3d0d7; font-size: 13px; font-weight: 700; }
      input { width: 100%; padding: 14px 15px; border: 1px solid #45424c; border-radius: 10px; outline: none; background: #131318; color: #fff; font: inherit; transition: border-color .15s, box-shadow .15s; }
      input:focus { border-color: #e6a94d; box-shadow: 0 0 0 3px rgba(230,169,77,.16); }
      button { min-height: 48px; margin-top: 4px; border: 0; border-radius: 10px; background: #e6a94d; color: #17110a; font: inherit; font-weight: 800; cursor: pointer; transition: transform .15s, filter .15s; }
      button:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
      button:disabled { cursor: wait; opacity: .65; }
      #status { min-height: 22px; margin: 18px 0 0; color: #a7a5ae; font-size: 13px; line-height: 1.5; }
      #status.error { color: #ee847e; } #status.ok { color: #8bcc8e; }
      .mark { display: inline-grid; place-items: center; width: 34px; height: 34px; margin-bottom: 25px; border: 1px solid rgba(230,169,77,.5); border-radius: 9px; color: #e6a94d; font: 800 17px Inter, ui-sans-serif, system-ui, sans-serif; }
      .hidden { display: none; }
      main:has(#campaign-home:not(.hidden)) { width: min(100% - 32px, 660px); }
      .home-heading { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px; }
      .home-heading h2, .campaign-section h2 { margin:0; font-size:18px; }
      .campaign-section { margin-top:26px; }
      .campaign-list { display:grid; gap:9px; margin-top:10px; }
      .campaign-row { display:flex; align-items:center; gap:8px; padding:8px; border:1px solid #34323a; border-radius:11px; background:#19191f; }
      .campaign-row > button:first-child { flex:1; margin:0; border:0; background:transparent; color:#ececee; text-align:left; }
      .campaign-row > button:last-child { flex:0 0 auto; min-height:40px; margin:0; padding:8px 11px; background:transparent; border:1px solid #45424c; color:#d3d0d7; }
      .campaign-empty { margin:8px 0 0; color:#a7a5ae; }
    </style>
  </head>
  <body>
    <main aria-live="polite">
      <div class="mark" aria-hidden="true">R</div>
      <p class="eyebrow">Private campaign table</p>
      <h1>Roll30</h1>
      <p class="intro" id="intro">Checking whether this table already knows you…</p>
      <form id="gate" class="hidden">
        <label for="password">Table password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
        <button id="submit" type="submit">Enter the table</button>
      </form>
      <form id="auth" class="hidden">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required>
        <label for="account-password">Account password</label>
        <input id="account-password" type="password" autocomplete="current-password" minlength="8" required>
        <button id="auth-submit" type="submit">Sign in</button>
        <button id="auth-toggle" type="button" style="margin-top:0;background:transparent;border:1px solid #45424c;color:#d3d0d7">Create an account instead</button>
      </form>
      <section id="campaign-home" class="hidden">
        <div class="home-heading"><h2>Your campaigns</h2><button id="sign-out" type="button" style="min-height:40px;margin:0;padding:8px 12px;background:transparent;border:1px solid #45424c;color:#d3d0d7">Sign out</button></div>
        <form id="create-campaign">
          <label for="campaign-name">New campaign</label>
          <input id="campaign-name" maxlength="120" placeholder="Campaign name" required>
          <button type="submit">Create campaign</button>
        </form>
        <form id="join-campaign" style="margin-top:18px">
          <label for="join-code">Join a friend's campaign</label>
          <input id="join-code" placeholder="Join code" required>
          <button type="submit" style="background:transparent;border:1px solid #45424c;color:#d3d0d7">Join campaign</button>
        </form>
        <section class="campaign-section"><h2>Ready to play</h2><div id="campaign-list" class="campaign-list"></div></section>
        <section class="campaign-section hidden" id="archived-section"><h2>Archived</h2><div id="archived-list" class="campaign-list"></div></section>
        <section class="campaign-section hidden" id="trashed-section"><h2>Trash</h2><div id="trashed-list" class="campaign-list"></div></section>
      </section>
      <p id="status" role="status"></p>
    </main>
    <script>
      const endpoint = 'https://eujhtcnnjtwsthscdfqk.supabase.co/functions/v1/access-gate';
      const gate = document.getElementById('gate');
      const password = document.getElementById('password');
      const submit = document.getElementById('submit');
      const status = document.getElementById('status');
      const intro = document.getElementById('intro');
      const auth = document.getElementById('auth');
      const email = document.getElementById('email');
      const accountPassword = document.getElementById('account-password');
      const authSubmit = document.getElementById('auth-submit');
      const authToggle = document.getElementById('auth-toggle');
      const campaignHome = document.getElementById('campaign-home');
      const createCampaignForm = document.getElementById('create-campaign');
      const joinCampaignForm = document.getElementById('join-campaign');
      const campaignName = document.getElementById('campaign-name');
      const joinCode = document.getElementById('join-code');
      const campaignList = document.getElementById('campaign-list');
      const archivedSection = document.getElementById('archived-section');
      const archivedList = document.getElementById('archived-list');
      const trashedSection = document.getElementById('trashed-section');
      const trashedList = document.getElementById('trashed-list');
      const signOut = document.getElementById('sign-out');
      let signUpMode = false;

      function setStatus(message, kind = '') { status.textContent = message; status.className = kind; }
      function selectCampaign(campaign) { localStorage.setItem('roll30.campaignId', campaign.id); window.location.replace('./Roll30.html'); }
      async function openTable() {
        auth.classList.add('hidden'); gate.classList.add('hidden');
        intro.textContent = 'Choose a campaign, or start a new one.';
        campaignHome.classList.remove('hidden');
        setStatus('');
        const currentSession = await window.Roll30Backend.getSession();
        const [campaigns, trashed] = await Promise.all([window.Roll30Backend.campaigns(), window.Roll30Backend.trashedCampaigns()]);
        const active = campaigns.filter(campaign => !campaign.archived_at);
        const archived = campaigns.filter(campaign => campaign.archived_at);
        const empty = message => { const paragraph = document.createElement('p'); paragraph.className = 'campaign-empty'; paragraph.textContent = message; return paragraph; };
        const row = (campaign, mode = 'active') => {
          const wrapper = document.createElement('div'); wrapper.className = 'campaign-row';
          const primary = document.createElement('button'); primary.type = 'button'; primary.textContent = campaign.name + '  ·  ' + campaign.system;
          if (mode === 'active') primary.addEventListener('click', () => selectCampaign(campaign)); else primary.disabled = true;
          wrapper.append(primary);
          if (mode !== 'active' && campaign.owner_id === currentSession.user.id) {
            const restore = document.createElement('button'); restore.type = 'button'; restore.textContent = 'Restore';
            restore.addEventListener('click', async () => { restore.disabled = true; const rpc = mode === 'trash' ? 'restore_roll30_campaign' : 'set_roll30_campaign_archived'; const args = mode === 'trash' ? {target_campaign:campaign.id} : {target_campaign:campaign.id,should_archive:false}; const { error } = await window.Roll30Backend.client.rpc(rpc,args); if(error){setStatus(error.message,'error');restore.disabled=false;}else openTable(); });
            wrapper.append(restore);
            if (mode === 'trash') {
              const remove = document.createElement('button'); remove.type = 'button'; remove.textContent = 'Delete permanently';
              remove.addEventListener('click', async () => {
                const confirmation = window.prompt(`Permanently delete “${campaign.name}”, including every scene, character, message, and uploaded file? Type DELETE to confirm.`);
                if (confirmation !== 'DELETE') return;
                remove.disabled = true; restore.disabled = true; setStatus('Permanently deleting campaign and private files…');
                const { data, error } = await window.Roll30Backend.client.functions.invoke('delete-campaign', { body:{ campaignId:campaign.id, confirmation } });
                if (error || data?.error) { setStatus(data?.error || error?.message || 'Permanent deletion failed.', 'error'); remove.disabled = false; restore.disabled = false; }
                else { setStatus(`Campaign deleted permanently. ${data.filesRemoved || 0} private files were removed.`); openTable(); }
              });
              wrapper.append(remove);
            }
          }
          return wrapper;
        };
        campaignList.replaceChildren(...(active.length ? active.map(campaign => row(campaign)) : [empty('No active campaigns yet. Create one or join with a friend’s code.') ]));
        archivedList.replaceChildren(...archived.map(campaign => row(campaign,'archive'))); archivedSection.classList.toggle('hidden', !archived.length);
        trashedList.replaceChildren(...trashed.map(campaign => row(campaign,'trash'))); trashedSection.classList.toggle('hidden', !trashed.length);
      }
      async function enter() {
        const session = await window.Roll30Backend.getSession();
        if (session) return openTable();
        intro.textContent = 'Sign in to create, join, and play in your private Roll30 campaigns.';
        auth.classList.remove('hidden');
        email.focus();
      }
      async function request(body) {
        const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || 'The access gate could not be reached.');
        return data;
      }

      gate.addEventListener('submit', async (event) => {
        event.preventDefault();
        submit.disabled = true;
        setStatus('Checking the table password…');
        try {
          const result = await request({ action: 'unlock', password: password.value });
          password.value = '';
          if (result.allowed) return enter();
          if (result.blocked) return setStatus(`Too many attempts. Please try again in about ${Math.ceil((result.retry_after_seconds || 900) / 60)} minutes.`, 'error');
          setStatus(`That password did not work. ${result.attempts_remaining ?? 0} attempts remaining before a short lockout.`, 'error');
        } catch (error) { setStatus(error.message, 'error'); }
        finally { submit.disabled = false; password.focus(); }
      });

      authToggle.addEventListener('click', () => {
        signUpMode = !signUpMode;
        authSubmit.textContent = signUpMode ? 'Create account' : 'Sign in';
        authToggle.textContent = signUpMode ? 'I already have an account' : 'Create an account instead';
        intro.textContent = signUpMode ? 'Create your private Roll30 account.' : 'Sign in to your private Roll30 account.';
        setStatus('');
      });

      auth.addEventListener('submit', async (event) => {
        event.preventDefault();
        authSubmit.disabled = true;
        setStatus(signUpMode ? 'Creating your account…' : 'Signing you in…');
        try {
          const client = window.Roll30Backend.client;
          const result = signUpMode
            ? await client.auth.signUp({ email: email.value, password: accountPassword.value })
            : await client.auth.signInWithPassword({ email: email.value, password: accountPassword.value });
          if (result.error) throw result.error;
          if (!result.data.session) {
            setStatus('Check your email to confirm the account, then sign in.', 'ok');
            signUpMode = false; authSubmit.textContent = 'Sign in'; authToggle.textContent = 'Create an account instead';
            return;
          }
          await window.Roll30Backend.ensureProfile(result.data.user);
          openTable();
        } catch (error) { setStatus(error.message || 'Account access failed.', 'error'); }
        finally { authSubmit.disabled = false; }
      });

      signOut.addEventListener('click', async () => {
        await window.Roll30Backend.client.auth.signOut();
        localStorage.removeItem('roll30.campaignId');
        campaignHome.classList.add('hidden');
        enter();
      });

      createCampaignForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('Creating campaign…');
        try {
          const campaign = await window.Roll30Backend.createCampaign(campaignName.value);
          selectCampaign(campaign);
        } catch (error) { setStatus(error.message || 'Campaign creation failed.', 'error'); }
      });

      joinCampaignForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('Joining campaign…');
        try {
          const campaign = await window.Roll30Backend.joinCampaign(joinCode.value);
          selectCampaign(campaign);
        } catch (error) { setStatus(error.message || 'Could not join that campaign.', 'error'); }
      });

      (async () => {
        try {
          const result = await request({ action: 'check' });
          if (result.allowed) return enter();
          intro.textContent = 'This is a private table. Enter the shared password once and this network will be remembered.';
          gate.classList.remove('hidden');
          password.focus();
        } catch (error) {
          intro.textContent = 'The table access check is unavailable.';
          setStatus(error.message, 'error');
        }
      })();
    </script>
  </body>
</html>
